name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cacao_accounting/static/package-lock.json
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools flake8 bandit
          pip install -r development.txt
          pip install -e .[cloud]
      - name: Install JavaScript dependencies
        working-directory: cacao_accounting/static
        run: npm ci
      - name: Proyecto distribuible
        run: |
          python -m build
          twine check dist/*
      - name: Lint project code
        run: |
          python -m flake8 cacao_accounting/
          python -m ruff check cacao_accounting/
          python -m pydocstyle cacao_accounting/
          python -m mypy cacao_accounting/
      - name: Test with pytest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACAO_TEST=True LOGURU_LEVEL=WARNING SECRET_KEY=ASD123kljaAddS python -m pytest  -qq -s --exitfirst --slow=True --tb=line
      - name: Test Smart Select JavaScript
        working-directory: cacao_accounting/static
        run: npm test

  databases:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install python package
        env:
          CACAO_PRINT_DATABASE_URI: "True"
          CACAO_TEST: "True"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r development.txt
          python -m pip install -e .[cloud]
          python -m pip install psycopg2-binary
      - name: Test with SQLite
        env:
          CACAO_PRINT_DATABASE_URI: "True"
          CACAO_TEST: "True"
          CACAO_USER: "cacao"
          CACAO_PSWD: "cacao"
        run: |
          cacaoctl db init --seed
      - name: Test with MySQL + pymysql
        env:
          CACAO_PRINT_DATABASE_URI: "True"
          CACAO_TEST: "True"
          CACAO_USER: "cacao"
          CACAO_PSWD: "cacao"
        run: |
          sudo systemctl start mysql.service
          mysql --user=root --password=root < tests/setup_mysql.sql
          SECRET_KEY=ASD123kljaAddS CACAO_DB=mysql+pymysql://cacao:cacao@localhost/cacao cacaoctl db init --seed
      - name: Test with Postgresql + psycopg2
        env:
          CACAO_PRINT_DATABASE_URI: "True"
          CACAO_TEST: "True"
          CACAO_USER: "cacao2"
          CACAO_PSWD: "cacao2"
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER cacao2 WITH PASSWORD 'cacao2';"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON SCHEMA public TO cacao2;"
          sudo -u postgres psql -c "CREATE DATABASE cacao2;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE cacao2 TO cacao2;"
          sudo -u postgres psql -c "ALTER DATABASE cacao2 OWNER TO cacao2;"
          sudo -u postgres psql -c "ALTER ROLE cacao2 CREATEDB;"
          sudo -u postgres psql -c "GRANT USAGE ON SCHEMA public TO cacao2;"
          sudo -u postgres psql -c "GRANT CREATE ON SCHEMA public TO cacao2;"
          SECRET_KEY=ASD123klja+AddS CACAO_DB=postgresql+psycopg2://cacao2:cacao2@localhost/cacao2 cacaoctl db init --seed
      - name: Test with Postgresql + pg8000
        env:
          CACAO_PRINT_DATABASE_URI: "True"
          CACAO_TEST: "True"
          CACAO_USER: "cacao"
          CACAO_PSWD: "cacao"
        run: |
          sudo -u postgres psql -c "CREATE USER cacao WITH PASSWORD 'cacao';"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON SCHEMA public TO cacao;"
          sudo -u postgres psql -c "CREATE DATABASE cacao;"
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE cacao TO cacao;"
          sudo -u postgres psql -c "ALTER DATABASE cacao OWNER TO cacao;"
          sudo -u postgres psql -c "ALTER ROLE cacao CREATEDB;"
          sudo -u postgres psql -c "GRANT USAGE ON SCHEMA public TO cacao;"
          sudo -u postgres psql -c "GRANT CREATE ON SCHEMA public TO cacao;"
          SECRET_KEY=ASD123klj+aAddS LOGURU_LEVEL=WARNING CACAO_DB=postgresql+pg8000://cacao:cacao@localhost/cacao cacaoctl db init --seed

  desktop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cacao_accounting/static/package-lock.json
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install pytest
          pip install -e . --no-deps
      - name: Install JavaScript dependencies
        working-directory: cacao_accounting/static
        run: npm ci
      - name: Test with pytest in Desktop Mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACAO_TEST: "True"
          LOGURU_LEVEL: "ERROR"
          SECRET_KEY: "ASD123kljaAddS"
          CACAO_ACCOUNTING_DESKTOP: "True"
        run: |
          python -m pytest -qq -s --exitfirst --slow=True --tb=line

  coverage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r development.txt
          python -m pip install -e .[cloud]
      - name: Test with pytest
        run: |
          SECRET_KEY=ASD123kljaAddS LOGURU_LEVEL=ERROR CACAO_TEST=True python -m pytest -qq -s --slow=True --cov=cacao_accounting
      - name: Coveralls
        uses: coverallsapp/github-action@v2
