name: Desktop CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  desktop-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cacao_accounting/static/package-lock.json
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools flake8 bandit
          pip install -r development.txt
      - name: Install JavaScript dependencies
        working-directory: cacao_accounting/static
        run: npm ci
      - name: Test with pytest in Desktop Mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACAO_TEST: "True"
          LOGURU_LEVEL: "WARNING"
          SECRET_KEY: "ASD123kljaAddS"
          CACAO_ACCOUNTING_DESKTOP: "True"
        run: |
          python -m pytest -v -s --exitfirst --slow=True
