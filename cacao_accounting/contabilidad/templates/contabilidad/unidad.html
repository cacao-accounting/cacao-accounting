{% set acceso = permisos(modulo=id_modulo("accounting"), usuario=usuario.id)%}
{% extends "base.html" %}
{% block contenido %}

<nav aria-label="breadcrumb">
  <ol class="breadcrumb lh-sm">
    <li class="breadcrumb-item"><a href="{{ url_for('cacao_app.pagina_inicio') }}" class="link-dark"><i class="bi bi-house"></i> Inicio</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('contabilidad.conta') }}" class="link-dark">Contabilidad</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('contabilidad.unidades') }}" class="link-dark">Unidades de Negocio</a></li>
    <li class="breadcrumb-item active" aria-current="page">{{ registro.name }}</li>
  </ol>
</nav>

<div class="ca-card" style="max-width:680px;">
  <div class="ca-card-header">
    <h5 class="ca-card-title"><i class="bi bi-building"></i> {{ registro.name }}</h5>
    {% if acceso.configurar %}
    <a class="btn btn-sm btn-danger" href="{{ url_for('contabilidad.eliminar_unidad', id_unidad=registro.id) }}">
      <i class="bi bi-trash me-1"></i>Eliminar
    </a>
    {% endif %}
  </div>
</div>

{% endblock %}
