{% extends "base.html" %}
{% block contenido %}

{%- if TESTING -%}
<div data-test_info="La Plantilla fue renderizada correctamente: cacao_accounting/bancos/templates/bancos/pago_nuevo.html"></div>
{%- endif -%}

<nav aria-label="{{ _('breadcrumb') }}">
  <ol class="breadcrumb lh-sm">
    <li class="breadcrumb-item">
      <a href="{{ url_for('cacao_app.pagina_inicio') }}" class="link-dark">
        <i class="bi bi-house"></i> {{ _('Inicio') }}
      </a>
    </li>
    <li class="breadcrumb-item">
      <a href="{{ url_for('bancos.bancos_') }}" class="link-dark">{{ _('Bancos') }}</a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">{{ titulo }}</li>
  </ol>
</nav>

<script>
  window.paymentEntryForm = function (config) {
    return {
      header: {
        payment_type: config.initial.payment_type || 'receive',
        company: config.initial.company || '',
        naming_series_id: '',
        posting_date: config.initial.posting_date || new Date().toISOString().slice(0, 10),
        bank_account_id: '',
        currency: '',
        paid_amount: config.initial.paid_amount || 0,
        party_type: config.initial.party_type || 'customer',
        party_id: config.initial.party_id || '',
        remarks: config.initial.remarks || '',
        external_counter_id: config.initial.external_counter_id || '',
        external_number: '',
      },
      lines: config.initial.lines || [],
      payload: '',

      init: function () {
        var self = this;
        document.addEventListener('bank-account-selected', function (event) {
            self.header.bank_account_id = event.detail.value;
            if (event.detail.extra && event.detail.extra.currency) {
                self.header.currency = event.detail.extra.currency;
            }
        });
      },

      calculateTotal: function() {
        this.header.paid_amount = this.lines.reduce((sum, line) => sum + Number.parseFloat(line.allocated_amount || 0), 0);
      },

      prepareSubmit: function (event) {
        if (!this.header.company || !this.header.bank_account_id || this.header.paid_amount <= 0) {
          event.preventDefault();
          alert("{{ _('Por favor complete los campos obligatorios.') }}");
          return;
        }

        this.payload = JSON.stringify({
          ...this.header,
          lines: this.lines
        });
      }
    };
  };
</script>

<form method="post" x-data='paymentEntryForm({ initial: {{ initial_payment|tojson if initial_payment else "{}" }} })' @submit="prepareSubmit">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="payment_payload" :value="payload">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">{{ titulo }}</h4>
    <div class="d-flex gap-2">
      <a href="{{ url_for('bancos.bancos_pago_lista') }}" class="btn btn-sm btn-outline-secondary">{{ _('Cancelar') }}</a>
      <button class="btn btn-sm btn-primary" type="submit">
        <i class="bi bi-save"></i> {{ _('Guardar borrador') }}
      </button>
    </div>
  </div>

  <div class="ca-card p-3 mb-3">
    <div class="row g-3">
      <div class="col-md-3">
          <label class="form-label">{{ _('Tipo de transacción') }}</label>
          <select class="form-select" x-model="header.payment_type">
              <option value="receive">{{ _('Pago entrante (Cobro)') }}</option>
              <option value="pay">{{ _('Pago saliente') }}</option>
          </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('Compañía') }} <span class="text-danger">*</span></label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "company",
            name: "company",
            initialValue: "{{ initial_payment.company if initial_payment else "" }}"
          })'>
          <input type="hidden" x-model="selectedValue" x-effect="header.company = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar compañía...') }}" required>
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label">{{ _('Secuencia') }}</label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "naming_series",
            name: "naming_series_id",
            filters: { company: { selector: "#company_val" }, entity_type: function() { return "payment_entry" } },
            filterSources: ["#company_val"],
            autoSelectDefault: true
          })'>
          <input type="hidden" id="company_val" x-model="header.company">
          <input type="hidden" x-model="selectedValue" x-effect="header.naming_series_id = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Secuencia...') }}">
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label">{{ _('Cuenta Bancaria') }} <span class="text-danger">*</span></label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "bank_account",
            name: "bank_account_id",
            filters: { company: { selector: "#company_val" }, is_active: function() { return "True" } },
            filterSources: ["#company_val"],
            onSelect: function(opt) { $dispatch("bank-account-selected", opt) }
          })'>
          <input type="hidden" x-model="selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar cuenta...') }}" required>
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="col-md-2">
        <label class="form-label">{{ _('Moneda') }}</label>
        <input class="form-control bg-light" x-model="header.currency" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">{{ _('Fecha') }}</label>
        <input class="form-control" type="date" x-model="header.posting_date" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">{{ _('Monto total') }}</label>
        <input class="form-control text-end fw-bold" type="number" step="0.01" x-model="header.paid_amount" required>
      </div>
    </div>
  </div>

  <div class="ca-card p-3 mb-3">
      <div class="row g-3">
          <div class="col-md-3">
              <label class="form-label">{{ _('Tipo tercero') }}</label>
              <select class="form-select" x-model="header.party_type">
                  <option value="customer">{{ _('Cliente') }}</option>
                  <option value="supplier">{{ _('Proveedor') }}</option>
              </select>
          </div>
          <div class="col-md-9">
              <label class="form-label">{{ _('Tercero') }}</label>
              <div class="ca-smart-select" x-data='smartSelect({
                  doctype: "party",
                  name: "party_id",
                  filters: { party_type: function() { return $data.header.party_type } },
                  filterSources: ["header.party_type"],
                  initialValue: "{{ initial_payment.party_id if initial_payment else "" }}"
                })'>
                <input type="hidden" x-model="selectedValue" x-effect="header.party_id = selectedValue">
                <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar tercero...') }}">
                <div class="ca-smart-select-menu" x-show="open" x-cloak>
                  <template x-for="opt in options" :key="opt.value">
                    <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
                  </template>
                </div>
              </div>
          </div>
      </div>
      <div class="row g-3 mt-1">
          <div class="col-md-6">
              <label class="form-label">{{ _('Contador externo') }}</label>
              <div class="ca-smart-select" x-data='smartSelect({
                  doctype: "external_counter",
                  name: "external_counter_id",
                  filters: { company: { selector: "#company_val" }, is_active: function() { return "True" } },
                  filterSources: ["#company_val"]
                })'>
                <input type="hidden" x-model="selectedValue" x-effect="header.external_counter_id = selectedValue">
                <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar contador externo...') }}">
                <div class="ca-smart-select-menu" x-show="open" x-cloak>
                  <template x-for="opt in options" :key="opt.value">
                    <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
                  </template>
                </div>
              </div>
          </div>
          <div class="col-md-6">
              <label class="form-label">{{ _('Número externo') }}</label>
              <input class="form-control" type="text" x-model="header.external_number" :placeholder="'{{ _('Opcional: se sugiere automáticamente si está vacío') }}'">
          </div>
      </div>
  </div>

  <template x-if="lines.length > 0">
      <div class="ca-card p-0 mb-3 overflow-hidden">
          <div class="bg-light p-2 border-bottom">
              <h6 class="mb-0"><i class="bi bi-link-45deg"></i> {{ _('Asignación a Facturas') }}</h6>
          </div>
          <table class="ca-table mb-0">
              <caption>{{ _("Facturas pendientes para asignación de pago") }}</caption>
              <thead>
                  <tr>
                      <th>{{ _('Documento') }}</th>
                      <th class="text-end">{{ _('Total') }}</th>
                      <th class="text-end">{{ _('Saldo Pendiente') }}</th>
                      <th class="text-end" style="width: 150px;">{{ _('Monto a Aplicar') }}</th>
                  </tr>
              </thead>
              <tbody>
                  <template x-for="(line, index) in lines" :key="index">
                      <tr>
                          <td x-text="line.document_no"></td>
                          <td class="text-end" x-text="line.total_amount"></td>
                          <td class="text-end" x-text="line.outstanding_amount"></td>
                          <td>
                              <input type="number" step="0.01" class="form-control form-control-sm text-end"
                                     x-model="line.allocated_amount" @input="calculateTotal()">
                          </td>
                      </tr>
                  </template>
              </tbody>
          </table>
      </div>
  </template>

  <div class="ca-card p-3 mb-3">
      <label class="form-label">{{ _('Comentarios') }}</label>
      <textarea class="form-control" rows="3" x-model="header.remarks"></textarea>
  </div>

</form>

{% endblock %}
