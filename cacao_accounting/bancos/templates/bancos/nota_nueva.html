{% extends "base.html" %}
{% block contenido %}

<nav aria-label="{{ _('breadcrumb') }}">
  <ol class="breadcrumb lh-sm">
    <li class="breadcrumb-item">
      <a href="{{ url_for('cacao_app.pagina_inicio') }}" class="link-dark">
        <i class="bi bi-house"></i> {{ _('Inicio') }}
      </a>
    </li>
    <li class="breadcrumb-item">
      <a href="{{ url_for('bancos.bancos_') }}" class="link-dark">{{ _('Bancos') }}</a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">{{ titulo }}</li>
  </ol>
</nav>

<script>
  globalThis.bankNoteForm = function (config) {
    return {
      header: {
        payment_type: config.paymentType,
        company: '',
        naming_series_id: '',
        posting_date: new Date().toISOString().slice(0, 10),
        bank_account_id: '',
        currency: '',
        paid_amount: 0,
        paid_from_account_id: '', // Para Notas de Crédito (Ingreso)
        paid_to_account_id: '',   // Para Notas de Débito (Gasto)
        cost_center_code: '',
        unit_code: '',
        project_code: '',
        remarks: '',
        external_number: '',
      },
      payload: '',

      init: function () {
        document.addEventListener('bank-account-selected', (event) => {
            this.header.bank_account_id = event.detail.value;
            if (event.detail.extra && event.detail.extra.currency) {
                this.header.currency = event.detail.extra.currency;
            }
        });
      },

      prepareSubmit: function (event) {
        if (!this.header.company || !this.header.bank_account_id || this.header.paid_amount <= 0) {
          event.preventDefault();
          alert("{{ _('Por favor complete los campos obligatorios.') }}");
          return;
        }

        this.payload = JSON.stringify({
          payment_type: this.header.payment_type,
          company: this.header.company,
          naming_series_id: this.header.naming_series_id,
          posting_date: this.header.posting_date,
          bank_account_id: this.header.bank_account_id,
          paid_amount: this.header.paid_amount,
          paid_from_account_id: this.header.paid_from_account_id,
          paid_to_account_id: this.header.paid_to_account_id,
          cost_center_code: this.header.cost_center_code,
          unit_code: this.header.unit_code,
          project_code: this.header.project_code,
          remarks: this.header.remarks,
          external_number: this.header.external_number
        });
      }
    };
  };
</script>

<form method="post" x-data='bankNoteForm({ paymentType: "{{ payment_type }}" })' @submit="prepareSubmit">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="payment_payload" :value="payload">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">{{ titulo }}</h4>
    <div class="d-flex gap-2">
      <a href="{{ url_for('bancos.bancos_nota_debito_lista' if payment_type == 'debit_note' else 'bancos.bancos_nota_credito_lista') }}" class="btn btn-sm btn-outline-secondary">{{ _('Cancelar') }}</a>
      <button class="btn btn-sm btn-primary" type="submit">
        <i class="bi bi-save"></i> {{ _('Guardar borrador') }}
      </button>
    </div>
  </div>

  <div class="ca-card p-3 mb-3">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">{{ _('Compañía') }} <span class="text-danger">*</span></label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "company",
            name: "company"
          })'>
          <input type="hidden" x-model="selectedValue" x-effect="header.company = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar compañía...') }}" required>
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <label class="form-label">{{ _('Secuencia') }}</label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "naming_series",
            name: "naming_series_id",
            filters: { company: { selector: "#company_val" }, entity_type: function() { return "payment_entry" } },
            filterSources: ["#company_val"],
            autoSelectDefault: true
          })'>
          <input type="hidden" id="company_val" x-model="header.company">
          <input type="hidden" x-model="selectedValue" x-effect="header.naming_series_id = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Secuencia...') }}">
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label">{{ _('Cuenta Bancaria') }} <span class="text-danger">*</span></label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "bank_account",
            name: "bank_account_id",
            filters: { company: { selector: "#company_val" }, is_active: function() { return "True" } },
            filterSources: ["#company_val"],
            onSelect: function(opt) { $dispatch("bank-account-selected", opt) }
          })'>
          <input type="hidden" x-model="selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar cuenta...') }}" required>
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="col-md-2">
        <label class="form-label">{{ _('Moneda') }}</label>
        <input class="form-control bg-light" x-model="header.currency" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">{{ _('Fecha') }}</label>
        <input class="form-control" type="date" x-model="header.posting_date" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">{{ _('Monto') }}</label>
        <input class="form-control text-end fw-bold" type="number" step="0.01" x-model="header.paid_amount" required>
      </div>
    </div>
  </div>

  <div class="ca-card p-3 mb-3">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">{{ _('Centro de Costo') }}</label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "cost_center",
            name: "cost_center_code",
            filters: { company: { selector: "#company_val" }, is_active: function() { return "True" } },
            filterSources: ["#company_val"]
          })'>
          <input type="hidden" x-model="selectedValue" x-effect="header.cost_center_code = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar centro de costo...') }}">
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">{{ _('Unidad de Negocio') }}</label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "unit",
            name: "unit_code",
            filters: { company: { selector: "#company_val" } },
            filterSources: ["#company_val"]
          })'>
          <input type="hidden" x-model="selectedValue" x-effect="header.unit_code = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar unidad de negocio...') }}">
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">{{ _('Proyecto') }}</label>
        <div class="ca-smart-select" x-data='smartSelect({
            doctype: "project",
            name: "project_code",
            filters: { company: { selector: "#company_val" } },
            filterSources: ["#company_val"]
          })'>
          <input type="hidden" x-model="selectedValue" x-effect="header.project_code = selectedValue">
          <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar proyecto...') }}">
          <div class="ca-smart-select-menu" x-show="open" x-cloak>
            <template x-for="opt in options" :key="opt.value">
              <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ca-card p-3 mb-3">
    <div class="row g-3">
        <div class="col-md-12">
            {% if payment_type == "debit_note" %}
            <label class="form-label">{{ _('Cuenta Contable (Cargo / Gasto)') }} <span class="text-danger">*</span></label>
            <div class="ca-smart-select" x-data='smartSelect({
                doctype: "account",
                name: "paid_to_account_id",
                filters: { company: { selector: "#company_val" } },
                filterSources: ["#company_val"]
              })'>
              <input type="hidden" x-model="selectedValue" x-effect="header.paid_to_account_id = selectedValue">
              <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar cuenta contable...') }}" required>
              <div class="ca-smart-select-menu" x-show="open" x-cloak>
                <template x-for="opt in options" :key="opt.value">
                  <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
                </template>
              </div>
            </div>
            {% else %}
            <label class="form-label">{{ _('Cuenta Contable (Abono / Ingreso)') }} <span class="text-danger">*</span></label>
            <div class="ca-smart-select" x-data='smartSelect({
                doctype: "account",
                name: "paid_from_account_id",
                filters: { company: { selector: "#company_val" } },
                filterSources: ["#company_val"]
              })'>
              <input type="hidden" x-model="selectedValue" x-effect="header.paid_from_account_id = selectedValue">
              <input class="form-control" type="text" x-model="search" @input="onInput" @focus="onFocus" @blur="closeSoon" placeholder="{{ _('Buscar cuenta contable...') }}" required>
              <div class="ca-smart-select-menu" x-show="open" x-cloak>
                <template x-for="opt in options" :key="opt.value">
                  <button class="ca-smart-select-option" type="button" @mousedown.prevent="selectOption(opt)" x-text="opt.display_name"></button>
                </template>
              </div>
            </div>
            {% endif %}
        </div>
        <div class="col-md-6">
            <label class="form-label">{{ _('Referencia externa') }}</label>
            <input class="form-control" x-model="header.external_number" placeholder="{{ _('No. documento...') }}">
        </div>
        <div class="col-md-12">
            <label class="form-label">{{ _('Descripción / Concepto') }}</label>
            <textarea class="form-control" rows="3" x-model="header.remarks"></textarea>
        </div>
    </div>
  </div>

</form>

{% endblock %}
