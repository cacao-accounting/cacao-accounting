{% extends "base.html" %}
{% block contenido %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb lh-sm">
    <li class="breadcrumb-item"><a href="{{ url_for('admin.admin_') }}" class="link-dark">Configuración</a></li>
    <li class="breadcrumb-item active" aria-current="page">External Document Validation</li>
  </ol>
</nav>

<div class="ca-page-header">
  <h4><i class="bi bi-qr-code me-2" style="color:#78BF30"></i>External Document Validation</h4>
</div>

<form method="post" class="ca-card p-3">
  <div class="form-check form-switch mb-3">
    <input class="form-check-input" type="checkbox" role="switch" id="enabled" name="enabled" {% if enabled %}checked{% endif %}>
    <label class="form-check-label" for="enabled">Enabled</label>
  </div>

  <div class="mb-3">
    <label for="base_url" class="form-label">Base URL</label>
    <input type="url" class="form-control" id="base_url" name="base_url" value="{{ base_url }}" placeholder="{{ fallback_url }}">
    <div class="form-text">Fallback: {{ fallback_url }}</div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
    <a href="{{ url_for('admin.admin_') }}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
  </div>
</form>
{% endblock %}
